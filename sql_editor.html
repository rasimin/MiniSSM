<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html;charset=utf-8" >
    <style>
        html, body, #container {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1e1e1e;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>
    <script>
        require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs' } });
        
        var editor;
        var tableColumns = {}; // Key: "schema.table" & "table", Value: ["col1", "col2", ...]
        var schemas = [];      // Unique schema list
        var tables = [];       // Unique table list
        var storedProcedures = [];
        var scalarFunctions = [];
        var tableFunctions = [];
        var objectTypes = {};
        var columnDetails = {};
        var routineParameters = {};
        var databases = [];
        var activeDatabase = '';
        var databaseMetadata = {};
        var pendingDatabaseMetadata = {};

        require(['vs/editor/editor.main'], function () {
            // Register custom completion item provider for sql
            monaco.languages.registerCompletionItemProvider('sql', {
                triggerCharacters: ['.', ' '],
                provideCompletionItems: function (model, position) {
                    var word = model.getWordUntilPosition(position);
                    var range = {
                        startLineNumber: position.lineNumber,
                        endLineNumber: position.lineNumber,
                        startColumn: word.startColumn,
                        endColumn: word.endColumn
                    };
                    
                    var lineText = model.getLineContent(position.lineNumber);
                    var textBeforeCursor = lineText.substring(0, position.column - 1);
                    var isAfterDot = textBeforeCursor.endsWith('.');
                    
                    var suggestions = [];
                    var fullSql = model.getValue();
                    var sourceContext = /\b(?:FROM|JOIN|APPLY)\s+[\[\]a-zA-Z0-9_.#]*$/i.test(textBeforeCursor);

                    // Suggest routine parameters after EXEC proc or inside a function call.
                    var routineContext = textBeforeCursor.match(/\bEXEC(?:UTE)?\s+([\[\]a-zA-Z0-9_.]+)\s+(?:[^;]*)$/i) ||
                        textBeforeCursor.match(/([\[\]a-zA-Z0-9_.]+)\s*\([^)]*$/i);
                    if (routineContext) {
                        var routineName = routineContext[1].replace(/[\[\]]/g, '');
                        var parameters = routineParameters[routineName];
                        if (!parameters) {
                            Object.keys(routineParameters).some(key => {
                                if (key.toLowerCase().endsWith('.' + routineName.toLowerCase())) {
                                    parameters = routineParameters[key];
                                    return true;
                                }
                                return false;
                            });
                        }
                        if (parameters) {
                            parameters.forEach(parameterName => {
                                suggestions.push({
                                    label: parameterName,
                                    kind: monaco.languages.CompletionItemKind.Variable,
                                    insertText: parameterName,
                                    detail: "Routine Parameter (" + routineName + ")",
                                    sortText: "0_" + parameterName,
                                    range: range
                                });
                            });
                            return { suggestions: suggestions };
                        }
                    }

                    // After EXEC/EXECUTE, suggest stored procedures instead of tables/columns.
                    var execMatch = textBeforeCursor.match(/\bEXEC(?:UTE)?\s+([a-zA-Z0-9_.]*)$/i);
                    if (execMatch) {
                        var procedureToken = execMatch[1];
                        var schemaPrefix = procedureToken.indexOf('.') > -1
                            ? procedureToken.substring(0, procedureToken.lastIndexOf('.') + 1)
                            : '';

                        storedProcedures.forEach(procedureName => {
                            if (schemaPrefix && !procedureName.toLowerCase().startsWith(schemaPrefix.toLowerCase())) {
                                return;
                            }

                            var insertName = schemaPrefix
                                ? procedureName.substring(procedureName.lastIndexOf('.') + 1)
                                : procedureName;

                            suggestions.push({
                                label: procedureName,
                                kind: monaco.languages.CompletionItemKind.Function,
                                insertText: insertName,
                                detail: "Stored Procedure",
                                sortText: "0_" + procedureName,
                                range: range
                            });
                        });

                        return { suggestions: suggestions };
                    }

                    if (isAfterDot) {
                        var crossDatabaseMatch = textBeforeCursor.match(/(?:\[([^\]]+)\]|([a-zA-Z0-9_]+))\.(?:\[([^\]]+)\]|([a-zA-Z0-9_]+))\.$/);
                        if (crossDatabaseMatch) {
                            var crossDatabase = crossDatabaseMatch[1] || crossDatabaseMatch[2];
                            var crossSchema = crossDatabaseMatch[3] || crossDatabaseMatch[4];
                            var crossMeta = databaseMetadata[crossDatabase.toLowerCase()];
                            if (!crossMeta) {
                                requestDatabaseMetadata(crossDatabase);
                                return { suggestions: [] };
                            }
                            Object.keys(crossMeta.columns || {}).forEach(objectName => {
                                if (sourceContext && objectName.toLowerCase().startsWith(crossSchema.toLowerCase() + '.')) {
                                    var shortName = objectName.substring(crossSchema.length + 1);
                                    suggestions.push({
                                        label: shortName,
                                        kind: monaco.languages.CompletionItemKind.Class,
                                        insertText: shortName,
                                        detail: (crossMeta.objectTypes[objectName] || "Table") + " (" + crossDatabase + "." + crossSchema + ")",
                                        range: range
                                    });
                                }
                            });
                            var crossFunctions = sourceContext
                                ? (crossMeta.tableFunctions || [])
                                : (crossMeta.scalarFunctions || []);
                            crossFunctions.forEach(functionName => {
                                if (functionName.toLowerCase().startsWith(crossSchema.toLowerCase() + '.')) {
                                    suggestions.push({
                                        label: functionName.substring(crossSchema.length + 1),
                                        kind: monaco.languages.CompletionItemKind.Function,
                                        insertText: functionName.substring(crossSchema.length + 1),
                                        detail: (sourceContext ? "Table-valued" : "Scalar") + " Function (" + crossDatabase + "." + crossSchema + ")",
                                        range: range
                                    });
                                }
                            });
                            return { suggestions: suggestions };
                        }

                        // Find the word preceding the dot
                        var match = textBeforeCursor.match(/(\[?[a-zA-Z0-9_\u00c0-\u00ff]+\]?)\.$/);
                        if (match) {
                            var identifier = match[1].replace(/[\[\]]/g, '');

                            var databaseName = databases.find(name => name.toLowerCase() === identifier.toLowerCase());
                            if (databaseName && databaseName.toLowerCase() !== activeDatabase.toLowerCase()) {
                                var databaseMeta = databaseMetadata[databaseName.toLowerCase()];
                                if (!databaseMeta) {
                                    requestDatabaseMetadata(databaseName);
                                    return { suggestions: [] };
                                }
                                var databaseSchemas = new Set();
                                Object.keys(databaseMeta.columns || {}).forEach(name => databaseSchemas.add(name.split('.')[0]));
                                databaseSchemas.forEach(schemaName => {
                                    suggestions.push({
                                        label: schemaName,
                                        kind: monaco.languages.CompletionItemKind.Module,
                                        insertText: schemaName,
                                        detail: "Schema (" + databaseName + ")",
                                        range: range
                                    });
                                });
                                return { suggestions: suggestions };
                            }

                            // 1. Check if the identifier is a Schema
                            if (schemas.indexOf(identifier) > -1) {
                                // List tables under this schema
                                tables.forEach(t => {
                                    if (sourceContext && t.toLowerCase().startsWith((identifier + '.').toLowerCase())) {
                                        var tableNameOnly = t.substring(identifier.length + 1);
                                        suggestions.push({
                                            label: tableNameOnly,
                                            kind: monaco.languages.CompletionItemKind.Class,
                                            insertText: tableNameOnly,
                                            detail: (objectTypes[t] || "Table") + " (" + identifier + ")",
                                            range: range
                                        });
                                    }
                                });

                                scalarFunctions.forEach(functionName => {
                                    if (!sourceContext && functionName.toLowerCase().startsWith((identifier + '.').toLowerCase())) {
                                        var shortName = functionName.substring(identifier.length + 1);
                                        suggestions.push({
                                            label: shortName,
                                            kind: monaco.languages.CompletionItemKind.Function,
                                            insertText: shortName,
                                            detail: "Scalar Function (" + identifier + ")",
                                            range: range
                                        });
                                    }
                                });

                                tableFunctions.forEach(functionName => {
                                    if (sourceContext && functionName.toLowerCase().startsWith((identifier + '.').toLowerCase())) {
                                        var shortName = functionName.substring(identifier.length + 1);
                                        suggestions.push({
                                            label: shortName,
                                            kind: monaco.languages.CompletionItemKind.Function,
                                            insertText: shortName,
                                            detail: "Table-valued Function (" + identifier + ")",
                                            range: range
                                        });
                                    }
                                });
                                return { suggestions: suggestions };
                            }

                            // 2. Check if the identifier is a Table directly
                            var columns = tableColumns[identifier];

                            // 3. Check if the identifier is a Table Alias
                            if (!columns) {
                                var realTableName = getTableForAlias(identifier, fullSql);
                                if (realTableName) {
                                    columns = tableColumns[realTableName];
                                }
                            }

                            // If columns found, show column suggestions
                            if (columns) {
                                columns.forEach(col => {
                                    suggestions.push({
                                        label: col,
                                        kind: monaco.languages.CompletionItemKind.Field,
                                        insertText: col,
                                        detail: "Column",
                                        range: range
                                    });
                                });
                                return { suggestions: suggestions };
                            }
                        }
                    }

                    // Check if cursor is right after an asterisk "*" (for wildcard column list expansion)
                    var textTrimmed = textBeforeCursor.trim();
                    var endsWithAsterisk = textTrimmed.endsWith('*') && !textTrimmed.endsWith('.*');

                    if (endsWithAsterisk) {
                        var queryTables = getTablesInQuery(model.getValue());
                        queryTables.forEach(qt => {
                            var cols = findColumns(qt);
                            if (cols) {
                                var columnList = cols.join(', ');
                                suggestions.push({
                                    label: "* (Expand Columns - " + qt + ")",
                                    kind: monaco.languages.CompletionItemKind.Snippet,
                                    insertText: columnList,
                                    detail: "Expand wildcard * to column list of " + qt,
                                    range: {
                                        startLineNumber: position.lineNumber,
                                        endLineNumber: position.lineNumber,
                                        startColumn: textBeforeCursor.lastIndexOf('*') + 1, // Overwrite the asterisk character
                                        endColumn: position.column
                                    }
                                });
                            }
                        });
                        if (suggestions.length > 0) {
                            return { suggestions: suggestions };
                        }
                    }

                    // Otherwise, provide general suggestions (Keywords, Snippets, Schemas, and Tables)

                    var localObjects = getLocalObjects(fullSql);
                    Object.keys(localObjects).forEach(objectName => {
                        suggestions.push({
                            label: objectName,
                            kind: monaco.languages.CompletionItemKind.Struct,
                            insertText: objectName,
                            detail: localObjects[objectName].type,
                            range: range
                        });
                    });
                    
                    // 1. Snippet ssf: SELECT TOP 50 * FROM
                    suggestions.push({
                        label: "ssf",
                        kind: monaco.languages.CompletionItemKind.Snippet,
                        insertText: "SELECT TOP 50 * FROM $0",
                        insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
                        detail: "Snippet: SELECT TOP 50 * FROM",
                        range: range
                    });

                    // 2. Columns of tables present in the current query (Smart Autocomplete like Redgate)
                    var queryTables = getTablesInQuery(model.getValue());
                    queryTables.forEach(qt => {
                        var cols = findColumns(qt);
                        if (cols) {
                            cols.forEach(col => {
                                suggestions.push({
                                    label: col,
                                    kind: monaco.languages.CompletionItemKind.Field,
                                    insertText: col,
                                    detail: "Column (" + qt + ")",
                                    range: range
                                });
                            });
                        }
                    });

                    // 3. Standard SQL Keywords
                    var keywords = [
                        "SELECT", "FROM", "WHERE", "INSERT", "INTO", "UPDATE", "SET", "DELETE",
                        "CREATE", "TABLE", "DATABASE", "DROP", "ALTER", "JOIN", "INNER", "LEFT",
                        "RIGHT", "OUTER", "ON", "GROUP", "BY", "ORDER", "AND", "OR", "NOT",
                        "IN", "LIKE", "IS", "NULL", "AS", "COUNT", "SUM", "AVG", "MIN", "MAX", "EXEC"
                    ];
                    keywords.forEach(kw => {
                        suggestions.push({
                            label: kw,
                            kind: monaco.languages.CompletionItemKind.Keyword,
                            insertText: kw,
                            range: range
                        });
                    });

                    // 4. Schemas
                    schemas.forEach(s => {
                        suggestions.push({
                            label: s,
                            kind: monaco.languages.CompletionItemKind.Module,
                            insertText: s,
                            detail: "Schema",
                            range: range
                        });
                    });

                    // 5. Tables
                    if (sourceContext || textBeforeCursor.trim().length === 0) {
                        tables.forEach(t => {
                            suggestions.push({
                                label: t,
                                kind: monaco.languages.CompletionItemKind.Class,
                                insertText: t,
                                detail: objectTypes[t] || "Table",
                                range: range
                            });
                        });
                    }

                    // 6. Scalar and table-valued functions
                    if (!sourceContext) {
                        scalarFunctions.forEach(functionName => {
                            suggestions.push({
                                label: functionName,
                                kind: monaco.languages.CompletionItemKind.Function,
                                insertText: functionName,
                                detail: "Scalar Function",
                                range: range
                            });
                        });
                    }

                    if (sourceContext) {
                        tableFunctions.forEach(functionName => {
                            suggestions.push({
                                label: functionName,
                                kind: monaco.languages.CompletionItemKind.Function,
                                insertText: functionName,
                                detail: "Table-valued Function",
                                range: range
                            });
                        });
                    }

                    databases.forEach(databaseName => {
                        suggestions.push({
                            label: databaseName,
                            kind: monaco.languages.CompletionItemKind.Module,
                            insertText: '[' + databaseName + ']',
                            detail: databaseName === activeDatabase ? "Active Database" : "Database",
                            range: range
                        });
                    });

                    return { suggestions: suggestions };
                }
            });

            monaco.editor.registerCommand('minissms.viewObject', function (_, objectName, objectType) {
                window.chrome.webview.postMessage({
                    action: 'viewObjectDefinition',
                    objectName: objectName,
                    objectType: objectType
                });
            });

            monaco.languages.registerHoverProvider('sql', {
                provideHover: function (model, position) {
                    var tokenInfo = getSqlTokenAtPosition(model, position);
                    if (!tokenInfo || !tokenInfo.token) {
                        return null;
                    }

                    var token = tokenInfo.token.replace(/[\[\]]/g, '');
                    var columnInfo = findColumnHoverInfo(token, model.getValue());
                    if (columnInfo) {
                        var isNullable = columnInfo.info.isNullable ?? columnInfo.info.IsNullable;
                        var isIdentity = columnInfo.info.isIdentity ?? columnInfo.info.IsIdentity;
                        var isPrimaryKey = columnInfo.info.isPrimaryKey ?? columnInfo.info.IsPrimaryKey;
                        var dataType = columnInfo.info.dataType || columnInfo.info.DataType;
                        var flags = [];
                        flags.push(isNullable ? "NULL" : "NOT NULL");
                        if (isIdentity) flags.push("IDENTITY");
                        if (isPrimaryKey) flags.push("PRIMARY KEY");
                        return {
                            range: tokenInfo.range,
                            contents: [{
                                value: "**Column:** `" + columnInfo.name + "`  \n" +
                                    "**Type:** `" + dataType + "`  \n" +
                                    flags.join(" · ")
                            }]
                        };
                    }

                    var objectInfo = findObjectHoverInfo(token);
                    if (!objectInfo) {
                        return null;
                    }

                    var commandArgs = encodeURIComponent(JSON.stringify([
                        objectInfo.name,
                        objectInfo.type
                    ]));
                    return {
                        range: tokenInfo.range,
                        contents: [{
                            value: "**" + objectInfo.label + ":** `" + objectInfo.name + "`  \n\n" +
                                "[View Schema / Definition](command:minissms.viewObject?" + commandArgs + ")",
                            isTrusted: true
                        }]
                    };
                }
            });

            // Initialize Monaco Editor
            editor = monaco.editor.create(document.getElementById('container'), {
                value: '',
                language: 'sql',
                theme: 'vs-dark',
                automaticLayout: true,
                fontSize: 14,
                fontFamily: 'Consolas, Courier New, monospace',
                minimap: { enabled: false },
                scrollbar: {
                    verticalScrollbarSize: 6,
                    horizontalScrollbarSize: 6,
                    useShadows: false
                }
            });

            editor.onDidChangeModelContent(function() {
                if (!suppressChangeNotification) {
                    window.chrome.webview.postMessage({
                        action: 'contentChanged',
                        text: editor.getValue()
                    });
                }
            });

            // Send signal to C# on keydown inside Monaco for F5
            editor.addCommand(monaco.KeyCode.F5, function() {
                window.chrome.webview.postMessage({ action: 'execute' });
            });

            editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyN, function() {
                window.chrome.webview.postMessage({ action: 'newQuery' });
            });

            // WebView2 can consume Ctrl+Space before Monaco's default keybinding runs.
            // Register it explicitly so manual autocomplete always opens.
            editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.Space, function() {
                editor.trigger('keyboard', 'editor.action.triggerSuggest', {});
            });

            window.chrome.webview.postMessage({ action: 'editorReady' });
        });

        // Extract tables used in the query (FROM TableName / JOIN TableName)
        function getTablesInQuery(sqlText) {
            var tablesFound = [];
            var regex = /(?:FROM|JOIN|APPLY)\s+([#a-zA-Z0-9_\.\[\]]+)/gi;
            var match;
            while ((match = regex.exec(sqlText)) !== null) {
                var tableName = match[1].replace(/[\[\]]/g, ''); // Strip square brackets
                if (tablesFound.indexOf(tableName) === -1) {
                    tablesFound.push(tableName);
                }
            }
            return tablesFound;
        }

        function requestDatabaseMetadata(databaseName) {
            var key = databaseName.toLowerCase();
            if (pendingDatabaseMetadata[key] || databaseMetadata[key]) {
                return;
            }
            pendingDatabaseMetadata[key] = true;
            window.chrome.webview.postMessage({
                action: 'loadDatabaseMetadata',
                databaseName: databaseName
            });
        }

        function updateDatabaseMetadata(databaseName, metadata) {
            var key = databaseName.toLowerCase();
            databaseMetadata[key] = metadata || { columns: {}, objectTypes: {} };
            delete pendingDatabaseMetadata[key];
            if (editor) {
                editor.trigger('metadata', 'editor.action.triggerSuggest', {});
            }
        }

        function findColumns(objectName) {
            var normalized = objectName.replace(/[\[\]]/g, '');
            var columns = tableColumns[normalized];
            if (columns) {
                return columns;
            }

            for (var key in tableColumns) {
                if (key.toLowerCase().endsWith('.' + normalized.toLowerCase())) {
                    return tableColumns[key];
                }
            }

            var parts = normalized.split('.');
            if (parts.length >= 3) {
                var databaseName = parts[parts.length - 3].toLowerCase();
                var schemaObject = parts.slice(-2).join('.');
                var metadata = databaseMetadata[databaseName];
                return metadata && metadata.columns ? metadata.columns[schemaObject] : null;
            }
            return null;
        }

        function getSqlTokenAtPosition(model, position) {
            var selection = editor ? editor.getSelection() : null;
            if (selection && !selection.isEmpty() && monaco.Range.containsPosition(selection, position)) {
                var selectedToken = model.getValueInRange(selection).trim();
                if (/^[#\[\]a-zA-Z0-9_.]+$/.test(selectedToken)) {
                    return { token: selectedToken, range: selection };
                }
            }

            var line = model.getLineContent(position.lineNumber);
            var offset = position.column - 1;
            var regex = /[#\[\]a-zA-Z0-9_.]+/g;
            var match;
            while ((match = regex.exec(line)) !== null) {
                if (offset >= match.index && offset <= match.index + match[0].length) {
                    return {
                        token: match[0],
                        range: new monaco.Range(
                            position.lineNumber,
                            match.index + 1,
                            position.lineNumber,
                            match.index + match[0].length + 1)
                    };
                }
            }
            return null;
        }

        function findCaseInsensitiveProperty(object, propertyName) {
            if (!object) return null;
            var key = Object.keys(object).find(name => name.toLowerCase() === propertyName.toLowerCase());
            return key ? { key: key, value: object[key] } : null;
        }

        function findColumnHoverInfo(token, sqlText) {
            var parts = token.split('.');
            var columnName = parts[parts.length - 1];
            var objectCandidates = [];

            if (parts.length > 1) {
                var qualifier = parts.slice(0, -1).join('.');
                var aliasObject = getTableForAlias(qualifier, sqlText);
                objectCandidates.push(aliasObject || qualifier);
            } else {
                objectCandidates = getTablesInQuery(sqlText);
            }

            for (var i = 0; i < objectCandidates.length; i++) {
                var objectName = objectCandidates[i];
                var detailsEntry = findCaseInsensitiveProperty(columnDetails, objectName);
                if (!detailsEntry) {
                    detailsEntry = Object.keys(columnDetails)
                        .filter(key => key.toLowerCase().endsWith('.' + objectName.toLowerCase()))
                        .map(key => ({ key: key, value: columnDetails[key] }))[0];
                }
                if (!detailsEntry) continue;

                var columnEntry = findCaseInsensitiveProperty(detailsEntry.value, columnName);
                if (columnEntry) {
                    return {
                        name: detailsEntry.key + "." + columnEntry.key,
                        info: columnEntry.value
                    };
                }
            }
            return null;
        }

        function findObjectHoverInfo(token) {
            var objectEntry = findCaseInsensitiveProperty(objectTypes, token);
            if (!objectEntry) {
                objectEntry = Object.keys(objectTypes)
                    .filter(key => key.toLowerCase().endsWith('.' + token.toLowerCase()))
                    .map(key => ({ key: key, value: objectTypes[key] }))[0];
            }
            if (objectEntry) {
                var canonicalName = objectEntry.key.indexOf('.') > -1
                    ? objectEntry.key
                    : Object.keys(objectTypes).find(key =>
                        key.indexOf('.') > -1 && key.toLowerCase().endsWith('.' + objectEntry.key.toLowerCase())) || objectEntry.key;
                return {
                    name: canonicalName,
                    type: objectEntry.value,
                    label: objectEntry.value
                };
            }

            var routineGroups = [
                { items: storedProcedures, type: "StoredProcedure", label: "Stored Procedure" },
                { items: scalarFunctions, type: "Function", label: "Scalar Function" },
                { items: tableFunctions, type: "Function", label: "Table-valued Function" }
            ];
            for (var i = 0; i < routineGroups.length; i++) {
                var routineName = routineGroups[i].items.find(name =>
                    name.toLowerCase() === token.toLowerCase() ||
                    name.toLowerCase().endsWith('.' + token.toLowerCase()));
                if (routineName) {
                    return {
                        name: routineName,
                        type: routineGroups[i].type,
                        label: routineGroups[i].label
                    };
                }
            }
            return null;
        }

        // Resolve Table Alias by searching backwards in sql text
        function getTableForAlias(alias, sqlText) {
            var regex = new RegExp("(?:FROM|JOIN|APPLY)\\s+([#a-zA-Z0-9_\\.\\[\\]]+)\\s+(?:AS\\s+)?" + alias + "\\b", "i");
            var match = sqlText.match(regex);
            if (match) {
                return match[1].replace(/[\[\]]/g, '');
            }
            return null;
        }

        // Extract CTEs and temporary tables declared in the current editor text.
        function getLocalObjects(sqlText) {
            var objects = {};
            var cteRegex = /(?:\bWITH|,)\s*(\[?[a-zA-Z0-9_]+\]?)\s*(?:\(([^)]*)\))?\s+AS\s*\(/gi;
            var match;
            while ((match = cteRegex.exec(sqlText)) !== null) {
                var cteName = match[1].replace(/[\[\]]/g, '');
                var cteColumns = match[2]
                    ? match[2].split(',').map(c => c.trim().replace(/[\[\]]/g, '')).filter(Boolean)
                    : [];
                objects[cteName] = { type: "CTE", columns: cteColumns };
                tableColumns[cteName] = cteColumns;
            }

            var inferredCteRegex = /(?:\bWITH|,)\s*(\[?[a-zA-Z0-9_]+\]?)\s+AS\s*\(\s*SELECT\s+([\s\S]*?)\s+FROM\b/gi;
            while ((match = inferredCteRegex.exec(sqlText)) !== null) {
                var inferredName = match[1].replace(/[\[\]]/g, '');
                var inferredColumns = match[2].split(',').map(expression => {
                    var aliasMatch = expression.trim().match(/\bAS\s+(\[?[a-zA-Z0-9_]+\]?)\s*$/i);
                    if (aliasMatch) {
                        return aliasMatch[1].replace(/[\[\]]/g, '');
                    }
                    var cleanExpression = expression.trim().replace(/[\[\]]/g, '');
                    var parts = cleanExpression.split('.');
                    var candidate = parts[parts.length - 1].match(/[a-zA-Z0-9_]+$/);
                    return candidate ? candidate[0] : null;
                }).filter(Boolean);
                if (objects[inferredName] && objects[inferredName].columns.length === 0) {
                    objects[inferredName].columns = inferredColumns;
                    tableColumns[inferredName] = inferredColumns;
                }
            }

            var tempRegex = /\bCREATE\s+TABLE\s+(#(?:#)?[a-zA-Z0-9_]+)\s*\(([\s\S]*?)\)/gi;
            while ((match = tempRegex.exec(sqlText)) !== null) {
                var tempColumns = match[2].split(',').map(definition => {
                    var columnMatch = definition.trim().match(/^(\[?[a-zA-Z0-9_]+\]?)/);
                    return columnMatch ? columnMatch[1].replace(/[\[\]]/g, '') : null;
                }).filter(Boolean);
                objects[match[1]] = { type: "Temporary Table", columns: tempColumns };
                tableColumns[match[1]] = tempColumns;
            }

            return objects;
        }

        // C# callable functions:
        var suppressChangeNotification = false;

        function getQueryText() {
            if (editor) {
                var selection = editor.getSelection();
                var selectedText = editor.getModel().getValueInRange(selection);
                if (selectedText && selectedText.trim().length > 0) {
                    return selectedText;
                }
                return editor.getValue();
            }
            return '';
        }

        function getAllQueryText() {
            return editor ? editor.getValue() : '';
        }

        function setQueryText(text) {
            if (editor) {
                suppressChangeNotification = true;
                try {
                    editor.setValue(text);
                } finally {
                    suppressChangeNotification = false;
                }
            }
        }

        function focusEditor() {
            if (editor) {
                editor.focus();
            }
        }

        function insertTextAtCursor(text) {
            if (editor) {
                var selection = editor.getSelection();
                var range = new monaco.Range(
                    selection.startLineNumber,
                    selection.startColumn,
                    selection.endLineNumber,
                    selection.endColumn
                );
                var id = { major: 1, minor: 1 };
                var textEdit = { identifier: id, range: range, text: text, forceMoveMarkers: true };
                editor.executeEdits("my-source", [textEdit]);
                editor.focus();
            }
        }

        function getSelectedLineRange() {
            var selection = editor.getSelection();
            var startLine = selection.startLineNumber;
            var endLine = selection.endLineNumber;
            if (selection.endColumn === 1 && endLine > startLine) {
                endLine--;
            }
            return {
                selection: selection,
                startLine: startLine,
                endLine: endLine
            };
        }

        function updateSelectedLines(transformLine) {
            if (!editor) {
                return;
            }

            var model = editor.getModel();
            var rangeInfo = getSelectedLineRange();
            var edits = [];

            for (var lineNumber = rangeInfo.startLine; lineNumber <= rangeInfo.endLine; lineNumber++) {
                var oldText = model.getLineContent(lineNumber);
                var newText = transformLine(oldText);
                if (newText !== oldText) {
                    edits.push({
                        range: new monaco.Range(lineNumber, 1, lineNumber, oldText.length + 1),
                        text: newText
                    });
                }
            }

            if (edits.length > 0) {
                editor.executeEdits('toolbar-comment', edits);
            }

            editor.setSelection(rangeInfo.selection);
            editor.focus();
        }

        function commentSelection() {
            updateSelectedLines(function(line) {
                var indent = line.match(/^\s*/)[0];
                return indent + '-- ' + line.substring(indent.length);
            });
        }

        function uncommentSelection() {
            updateSelectedLines(function(line) {
                return line.replace(/^(\s*)--\s?/, '$1');
            });
        }

        function updateMetadata(meta) {
            meta = meta || {};
            tableColumns = meta.columns || {};
            objectTypes = meta.objectTypes || {};
            columnDetails = meta.columnDetails || {};
            storedProcedures = meta.storedProcedures || [];
            scalarFunctions = meta.scalarFunctions || [];
            tableFunctions = meta.tableFunctions || [];
            routineParameters = meta.routineParameters || {};
            databases = meta.databases || [];
            activeDatabase = meta.activeDatabase || '';
            tables = Object.keys(tableColumns);
            
            // Extract unique schemas from keys (e.g. "dbo" from "dbo.customers")
            var schemaSet = new Set();
            tables.forEach(t => {
                if (t.indexOf('.') > -1) {
                    schemaSet.add(t.split('.')[0]);
                }
            });
            scalarFunctions.concat(tableFunctions).forEach(functionName => {
                if (functionName.indexOf('.') > -1) {
                    schemaSet.add(functionName.split('.')[0]);
                }
            });
            schemas = Array.from(schemaSet);
        }
    </script>
</body>
</html>
